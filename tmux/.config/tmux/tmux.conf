set -g mouse on
set -g prefix C-s
bind C-s send C-s
set -g mode-keys vi
set -g allow-passthrough on
set -a terminal-features 'xterm-256color:RGB'
setw -g aggressive-resize on
# set -g extended-keys on
# set -g extended-keys-format csi-u

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -s set-clipboard on # Support OSC52

set -g status-position top
set -g status-style "bg=default"
set -g status-justify absolute-centre
set -g window-status-current-style "fg=blue bold"
set -g status-right ""
set -g status-left "#S"
set -g window-status-separator "  "

bind r source-file ~/.config/tmux/tmux.conf \; display "Source config file: ~/.config/tmux/tmux.conf"

# Should config terminal send \e[32;5;32~ when press Ctrl+Shift+Space
# bind-key -n "\e[32;5;32~" copy-mode
bind m set -g mouse \; display "Mouse Mode: #{?mouse,ON,OFF}"

bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Y send -X copy-end-of-line-and-cancel
#bind -T copy-mode-vi C-c send -X clear-selection

bind-key -n M-L select-pane -L
bind-key -n M-H select-pane -R
bind-key -n M-K select-pane -U
bind-key -n M-J select-pane -D

bind-key -n M-O resize-pane -Z
bind-key -n M-] next-window
bind-key -n M-[ previous-window

bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

bind-key Enter copy-mode \; send-keys -X start-of-line
